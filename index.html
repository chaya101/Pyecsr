<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pyecs</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff, #ff7b72);
      border-radius: 16px 16px 0 0;
    }

    .project-name {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }

    .tagline {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff);
      border-radius: 2px;
      margin: 0 auto 2.5rem;
    }

    .repo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .repo-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6e7681;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 0.65rem 1.25rem;
      color: #58a6ff;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .repo-link:hover {
      background: #2d333b;
      border-color: #58a6ff;
      transform: translateY(-2px);
    }

    .repo-link svg {
      flex-shrink: 0;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid #21262d;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .stat-label {
      font-size: 0.72rem;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3fb950;
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle;
    }

    footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.82rem;
      color: #6e7681;
      letter-spacing: 0.02em;
    }

    footer span {
      color: #bc8cff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="badge">
      <span class="dot"></span>Active Project
    </div>

    <div class="card">
      <h1 class="project-name">pyecs</h1>
      <p class="tagline">A modern Python library — lightweight, fast, and built for scale.</p>

      <div class="divider"></div>

      <div class="repo-section">
        <span class="repo-label">Repository</span>
        <a href="#" class="repo-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
          Pyecsr
        </a>
      </div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-value">Python</span>
          <span class="stat-label">Language</span>
        </div>
        <div class="stat">
          <span class="stat-value">MIT</span>
          <span class="stat-label">License</span>
        </div>
        <div class="stat">
          <span class="stat-value">v1.0</span>
          <span class="stat-label">Version</span>
        </div>
      </div>
    </div>

  </div>

  <footer>
    Developed by <span>Royal Bengal AI</span>
  </footer>

</body>
</html>
